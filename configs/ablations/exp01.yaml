# Exp 01 — DiT-XL ULTIMATE SOTA (burn most of remaining budget)
slurm:
  node: h100-80
  gpus: 8
  time: "12:00:00"
  # wall-clock 估算: DiT-XL Ada75% @ H100 0.15 GPUh/ep, 400ep × 0.15 / 8 × 1.2 = 9h
  # 用户要求 12h (2026-04-18)：留 3h buffer 吸收 data extract + wandb artifact 上传 + backfill 抖动

framework: flow_matching
use_ot: true
use_cfg: true
model_type: dit_xl
use_ada_mask: true
ada_mask_max: 0.75
num_epochs: 800
batch_size: 16
learning_rate: 0.0003

# FID disabled — root cause fixed in bb56af3, kept off until exp15 verifies end-to-end
fid_every_n_epochs: 0
