# Exp 15 — RF + OT on UNet (RF gain without DiT)
slurm:
  node: h100-80
  gpus: 3
  time: "04:00:00"
  # 3× H100, 4h walltime — UNet @ H100 0.02 GPUh/ep × 50ep / 3 GPU ≈ 0.35h train + VAE eval 余量

framework: flow_matching
use_cfg: true
model_type: unet
num_epochs: 50
batch_size: 32
learning_rate: 0.0001
use_ot: true
