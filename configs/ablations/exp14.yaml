# Exp 14 — DiT-L, OT-AdaMask 75%, Heun, NFE 10, dit_decoder_depth=0 (架构消融: 浅层Decoder对掩码空间的关键性)
# Deepthink Row 14: 证明 Decoder 深度对 OT-AdaMask 机制不可或缺 (对照 exp13)
# NOTE: 同 exp13 epoch 压缩策略, 300ep 足以暴露架构差异
slurm:
  node: h100-80
  gpus: 8
  time: "03:00:00"
  # wall-clock 估算: DiT-L Ada75% @ H100 0.06 GPUh/ep, 300ep × 0.06 / 8 × 1.2 = 2.7h → 3h

framework: flow_matching
use_ot: true
use_cfg: true
model_type: dit_l
use_ada_mask: true
ada_mask_max: 0.75
dit_decoder_depth: 0
num_epochs: 300
batch_size: 16
learning_rate: 0.0003
flow_solver: heun
num_inference_steps_flow: 10
