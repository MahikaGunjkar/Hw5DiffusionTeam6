# Exp 04 — DiT-S Scaling Law lower point
slurm:
  node: h100-80
  gpus: 8
  time: "01:00:00"
  # wall-clock 估算: DiT-S Ada75% @ H100 0.02 GPUh/ep, 300ep × 0.02 / 8 × 1.2 = 0.9h → 1h

framework: flow_matching
use_ot: true
use_cfg: true
model_type: dit_s
use_ada_mask: true
ada_mask_max: 0.75
num_epochs: 300
batch_size: 64
learning_rate: 0.0004
