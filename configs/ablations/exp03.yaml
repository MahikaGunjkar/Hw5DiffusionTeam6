# Exp 03 — DiT-B SOTA (main headline result)
# Full OT-AdaMask stack, 300 epochs. This is the anchor of the scaling-law plot.
slurm:
  node: h100-80
  gpus: 8
  time: "12:00:00"
  # wall-clock 估算约 0.9h，但按 exp01 的 Bridges-2 提交模板统一申请 12h
  # 用户要求 (2026-04-18)：保持 8x H100 + NVLink/NVLS + 12h，降低因模板不一致被卡的风险

framework: flow_matching
model_type: dit_b
use_ot: true
use_ada_mask: true
ada_mask_max: 0.75
use_cfg: true
num_epochs: 300
batch_size: 32
learning_rate: 3.0e-4

# FID disabled — root cause fixed in bb56af3, kept off until exp15 verifies end-to-end
fid_every_n_epochs: 0
