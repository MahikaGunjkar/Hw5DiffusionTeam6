# Exp 03 — DiT-B SOTA (main headline result)
# Full OT-AdaMask stack, 300 epochs. This is the anchor of the scaling-law plot.
slurm:
  node: h100-80
  gpus: 8
  time: "01:00:00"
  # wall-clock 估算: DiT-B Ada75% @ H100 0.02 GPUh/ep, 300ep × 0.02 / 8 × 1.2 = 0.9h → 1h

framework: flow_matching
model_type: dit_b
use_ot: true
use_ada_mask: true
ada_mask_max: 0.75
use_cfg: true
num_epochs: 300
batch_size: 32
learning_rate: 3.0e-4
