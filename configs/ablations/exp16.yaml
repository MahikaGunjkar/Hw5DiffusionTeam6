# Exp 16 — RF (no OT) on UNet (isolated RF contribution)
slurm:
  node: h100-80
  gpus: 8
  time: "01:00:00"
  # wall-clock 估算: UNet @ H100 0.02 GPUh/ep, 50ep × 0.02 / 8 × 1.2 = 0.15h → 1h

framework: flow_matching
use_cfg: true
model_type: unet
num_epochs: 50
batch_size: 32
learning_rate: 0.0001
use_ot: false
