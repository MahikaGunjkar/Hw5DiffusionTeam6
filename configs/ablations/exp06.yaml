# Exp 06 — AdaMask 50% (more conservative schedule)
slurm:
  node: h100-80
  gpus: 8
  time: "02:00:00"
  # wall-clock 估算: DiT-B Ada50% @ H100 0.03 GPUh/ep, 300ep × 0.03 / 8 × 1.2 = 1.35h → 2h

framework: flow_matching
use_ot: true
use_cfg: true
model_type: dit_b
use_ada_mask: true
ada_mask_max: 0.5
num_epochs: 300
batch_size: 32
learning_rate: 0.0003
