# Exp 02 — DiT-L Scaling Law upper point
slurm:
  node: h100-80
  gpus: 8
  time: "12:00:00"
  # wall-clock 估算约 1.8h，但按 exp01 的 Bridges-2 提交模板统一申请 12h
  # 用户要求 (2026-04-18)：保持 8x H100 + NVLink/NVLS + 12h，降低因模板不一致被卡的风险

framework: flow_matching
use_ot: true
use_cfg: true
model_type: dit_l
use_ada_mask: true
ada_mask_max: 0.75
num_epochs: 200
batch_size: 24
learning_rate: 0.0003

# FID disabled — root cause fixed in bb56af3, kept off until exp15 verifies end-to-end
fid_every_n_epochs: 0
