# Exp 07 — AdaMask 90% (near-collapse boundary)
slurm:
  node: h100-80
  gpus: 8
  time: "01:00:00"
  # wall-clock 估算: DiT-B Ada90%≈Ada75% @ H100 0.02 GPUh/ep, 300ep × 0.02 / 8 × 1.2 = 0.9h → 1h

framework: flow_matching
use_ot: true
use_cfg: true
model_type: dit_b
use_ada_mask: true
ada_mask_max: 0.9
num_epochs: 300
batch_size: 32
learning_rate: 0.0003
