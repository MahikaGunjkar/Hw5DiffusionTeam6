run_name: ddim
seed: 42
data_dir: ./data
image_size: 128
batch_size: 32
num_workers: 8
prefetch_factor: 4
persistent_workers: true
subset: 0.3
num_classes: 100
num_epochs: 50
learning_rate: 1e-4
weight_decay: 1e-4
grad_clip: 1.0
mixed_precision: bf16
compile_unet: true
compile_mode: reduce-overhead
num_train_timesteps: 1000
num_inference_steps: 50
beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear
variance_type: fixed_small
prediction_type: epsilon
clip_sample: false
clip_sample_range: 1.0
unet_in_size: 32
unet_in_ch: 3
unet_ch: 128
unet_num_res_blocks: 2
unet_ch_mult: [1, 2, 2, 4]
unet_attn: [2, 3]
unet_dropout: 0.0
latent_ddpm: true
use_cfg: true
use_ddim: true
sample_every_epochs: 5
